providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install", "cd frontend && rm -rf node_modules && npm install"]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "node node_modules/.bin/serve frontend/dist -s -l tcp://0.0.0.0:${PORT:-3000}"
